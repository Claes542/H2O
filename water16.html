<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>16 Water Molecules (48 atoms) — Quantum Simulation</title>
  <style>
    body { margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #000; overflow: hidden; flex-direction: column; }
    canvas { border: none; }
  </style>
</head>
<body>
  <script>
    window.onerror = function(msg, url, line) {
      document.body.style.color = 'red';
      document.body.innerHTML = '<pre>ERROR: ' + msg + '\nLine: ' + line + '\nFile: ' + url + '</pre>';
    };

    // 16 water molecules in a 4x4 grid on 100^3, 20 au screen
    // 0.2 au/cell. O-H bond ~1.8au = 9 cells. Spacing ~5au = 25 cells.
    var atoms = [];
    var gridSpacing = 22;  // cells between molecule centers
    var startI = 14, startJ = 14;
    var ohBond = 9;  // cells for O-H bond

    for (var row = 0; row < 4; row++) {
      for (var col = 0; col < 4; col++) {
        var ci = startI + col * gridSpacing;
        var cj = startJ + row * gridSpacing;
        // O at center
        atoms.push({ i: ci, j: cj, Z: 2, el: 'O' });
        // H1 upper-left, H2 upper-right (104.5 deg angle)
        atoms.push({ i: ci - 6, j: cj - 7, Z: 1, el: 'H' });
        atoms.push({ i: ci + 6, j: cj - 7, Z: 1, el: 'H' });
      }
    }

    function rcForZ(z) {
      if (z <= 1) return 0;    // H
      if (z === 2) return 0.4; // O
      if (z === 3) return 0.3; // N
      return 0.3;              // C
    }

    window.USER_NN = 100;
    window.USER_ATOMS = atoms;
    window.USER_SCREEN = 20;
    window.USER_STEPS = 20000;
    window.USER_Z = atoms.map(function(a) { return a.Z; });
    window.USER_RC = atoms.map(function(a) { return rcForZ(a.Z); });

    document.body.innerHTML += '<pre style="color:#0f0">Loading 16 H2O (' + atoms.length + ' atoms) on 100^3 grid...</pre>';

    var s = document.createElement('script');
    s.src = 'molecule.js?t=' + Date.now();
    s.onerror = function() { document.body.innerHTML = '<pre style="color:red">Failed to load molecule.js</pre>'; };
    s.onload = function() {
      var p5s = document.createElement('script');
      p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
      document.body.appendChild(p5s);
    };
    document.body.appendChild(s);
  </script>
</body>
</html>
