<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// Alanine dipeptide (Ace-Ala-NMe) — 22 atoms on 200^3, FULL 3D
// Extended conformation: phi ~ -180°, psi ~ 180°
(function() {
  var gridN = 300, scr = 20, N2 = 150;
  var h = scr / gridN; // 0.1 au per grid cell
  var A = 1.8897;
  var atoms = [];

  function addAtom(au_x, au_y, au_z, Z, el) {
    atoms.push({
      i: Math.round(N2 + au_x / h),
      j: Math.round(N2 + au_y / h),
      k: Math.round(N2 + au_z / h),
      Z: Z, el: el
    });
  }

  // 3D coordinates from standard geometry (Angstroms, converted to au)
  // Extended conformation: phi=-180, psi=180, omega=180
  // Source: standard peptide geometry + tetrahedral/planar angles

  // Backbone in xz-plane, sidechains extend in y
  // Ace methyl - Ace C=O - N1-H - Ca(Ha)(Cb(3H)) - C=O - N2-H - NMe methyl

  var r = A; // scale factor

  // Atom positions in 3D (au) — hand-built extended conformation
  // Backbone runs along x-axis, peptide planes alternate in xz

  // Ace methyl carbon
  addAtom(-5.5*r, 0, 0, 4, 'C');         // 0: Cme
  addAtom(-6.1*r, 0.9*r, 0, 1, 'H');     // 1
  addAtom(-6.1*r, -0.9*r, 0, 1, 'H');    // 2
  addAtom(-6.1*r, 0, 0.9*r, 1, 'H');     // 3

  // Ace carbonyl C
  addAtom(-4.0*r, 0, 0, 4, 'C');         // 4: Cace
  // Ace O (in xz plane, above)
  addAtom(-3.7*r, 0, 1.2*r, 2, 'O');     // 5: Oace

  // Peptide bond N1
  addAtom(-3.0*r, 0, -0.7*r, 3, 'N');    // 6: N1
  addAtom(-3.3*r, 0, -1.7*r, 1, 'H');    // 7: HN1

  // Ca (tetrahedral center)
  addAtom(-1.5*r, 0, -0.5*r, 4, 'C');    // 8: Ca
  // Ha (below Ca)
  addAtom(-1.3*r, 0, -1.6*r, 1, 'H');    // 9: Ha
  // Cb (methyl sidechain, extending in +y)
  addAtom(-1.2*r, 1.5*r, 0, 4, 'C');     // 10: Cb
  addAtom(-0.5*r, 2.1*r, 0.5*r, 1, 'H'); // 11
  addAtom(-2.1*r, 2.1*r, 0, 1, 'H');     // 12
  addAtom(-1.0*r, 1.5*r, -1.0*r, 1, 'H');// 13

  // Ala carbonyl C
  addAtom(-0.2*r, -0.5*r, 0.3*r, 4, 'C');// 14: Cala
  // Ala O (in xz plane)
  addAtom(-0.3*r, -0.5*r, 1.5*r, 2, 'O');// 15: Oala

  // Peptide bond N2
  addAtom(1.0*r, -0.8*r, -0.3*r, 3, 'N');// 16: N2
  addAtom(1.0*r, -0.8*r, -1.3*r, 1, 'H');// 17: HN2

  // NMe methyl carbon
  addAtom(2.3*r, -1.0*r, 0.2*r, 4, 'C'); // 18: Cnme
  addAtom(2.9*r, -0.1*r, 0.2*r, 1, 'H'); // 19
  addAtom(2.9*r, -1.8*r, -0.2*r, 1, 'H');// 20
  addAtom(2.2*r, -1.2*r, 1.2*r, 1, 'H'); // 21

  console.log('Alanine dipeptide 3D: ' + atoms.length + ' atoms');

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = true;
  window.USER_FORCE_SCALE = 5.0;
  window.USER_ARROW_SCALE = 5.0;
  window.USER_DAMPING = 0.90;
  window.USER_N_MOVE = 100;
  window.USER_Z = atoms.map(function(a) { return a.Z; });
  window.USER_RC = atoms.map(function(a) {
    if (a.el === 'H') return 0;
    if (a.el === 'C') return 0.3;
    if (a.el === 'N') return 0.3;
    if (a.el === 'O') return 0.4;
    return 0;
  });

  // Bond pairs for on-screen display [atom1, atom2, label]
  // Key backbone bonds + C=O + N-H
  window.USER_BOND_PAIRS = [
    [0, 4, "C-C:"],     // Ace methyl - Ace carbonyl
    [4, 5, "C=O:"],     // Ace carbonyl - O
    [4, 6, "C-N:"],     // Ace carbonyl - N1
    [6, 7, "N-H:"],     // N1 - H
    [6, 8, "N-Ca:"],    // N1 - Ca
    [8, 10, "Ca-Cb:"],  // Ca - Cb
    [8, 14, "Ca-C:"],   // Ca - Ala carbonyl
    [14, 15, "C=O:"],   // Ala carbonyl - O
    [14, 16, "C-N:"],   // Ala carbonyl - N2
    [16, 17, "N-H:"],   // N2 - H
    [16, 18, "N-C:"],   // N2 - NMe methyl
    [0, 1, "C-H:"],     // methyl H
    [8, 9, "Ca-H:"],    // alpha H
  ];
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
