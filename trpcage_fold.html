<!DOCTYPE html>
<html><body style="margin:0;background:#000;color:#fff;font-family:monospace">
<pre id="log">Building Trp-cage (extended)...</pre>
<script>
var log = document.getElementById('log');
window.onerror = function(msg, url, line) {
  log.textContent += '\nERROR: ' + msg + '\nLine: ' + line;
};

// Trp-cage TC5b: NLYIQWLKDGGPSSGRPPPS (20 residues)
// Start from extended chain with slight bend (~10%)
// Translate dynamics with SHAKE + fold tracking
// Native structure: helix(1-9) + 3_10 helix(11-14) + polyproline II(17-19)
// Key contact: Trp6 buries into hydrophobic core
(function() {
  var gridN = 400, scr = 90;
  var h = scr / gridN;
  var N2 = Math.round(gridN / 2);
  var A = 1.8897;
  var nRes = 20;
  var seq = ['N','L','Y','I','Q','W','L','K','D','G','G','P','S','S','G','R','P','P','P','S'];

  var atoms = [];
  var elList = [];
  var zList = [];

  function pushAtom(x, y, z, el, Z) {
    var gi = Math.round(N2 + x / h);
    var gj = Math.round(N2 + y / h);
    var gk = Math.round(N2 + z / h);
    gi = Math.max(3, Math.min(gridN - 3, gi));
    gj = Math.max(3, Math.min(gridN - 3, gj));
    gk = Math.max(3, Math.min(gridN - 3, gk));
    atoms.push({ i: gi, j: gj, k: gk, Z: Z, el: el });
    elList.push(el);
    zList.push(Z);
  }

  // Bond lengths
  var bNH = 1.01 * A;
  var bCH = 1.09 * A;
  var bCO = 1.24 * A;
  var bOH = 0.97 * A;
  var bCaCb = 1.52 * A;

  // Extended chain with slight bend
  var resAdv = 3.8 * A;
  var zig = 0.5 * A;
  var totalLen = (nRes - 1) * resAdv;
  var x0 = -totalLen / 2;

  // Slight bend at residue 10 (between helix and turn)
  var t = 0.1; // 10% fold
  var bbExt = [];
  for (var r = 0; r < nRes; r++) {
    var xr = x0 + r * resAdv;
    var zigSign = (r % 2 === 0) ? 1 : -1;
    var yBase = zigSign * zig;
    bbExt.push({
      N:  [xr - 0.35 * resAdv, yBase * 0.6],
      Ca: [xr,                 -yBase * 0.4],
      C:  [xr + 0.35 * resAdv, yBase * 0.3]
    });
  }

  // Hinge at residue 10
  var hingeX = (bbExt[9].C[0] + bbExt[10].N[0]) / 2;
  var hingeY = (bbExt[9].C[1] + bbExt[10].N[1]) / 2;
  var bendAngle = t * Math.PI;

  function rotFrac(r) {
    if (r <= 9) return 0;
    if (r === 10) return 0.25;
    if (r === 11) return 0.5;
    if (r === 12) return 0.75;
    return 1.0;
  }
  function rotatePoint(px, py, theta) {
    var dx = px - hingeX, dy = py - hingeY;
    var c = Math.cos(theta), s = Math.sin(theta);
    return [hingeX + dx * c - dy * s, hingeY + dx * s + dy * c];
  }

  var bb = [];
  for (var r = 0; r < nRes; r++) {
    var theta = rotFrac(r) * bendAngle;
    var N  = rotatePoint(bbExt[r].N[0],  bbExt[r].N[1],  theta);
    var Ca = rotatePoint(bbExt[r].Ca[0], bbExt[r].Ca[1], theta);
    var C  = rotatePoint(bbExt[r].C[0],  bbExt[r].C[1],  theta);
    bb.push({ N: N, Ca: Ca, C: C });
  }

  // Track indices
  var resStartIdx = [];
  var resEndIdx = [];
  var caIndices = [];
  var carbonylOIdx = [];
  var amideHIdx = [];

  for (var r = 0; r < nRes; r++) {
    resStartIdx.push(atoms.length);
    var res = bb[r];
    var Np = res.N, Cap = res.Ca, Cp = res.C;
    var aa = seq[r];
    var isPro = (aa === 'P');
    var isGly = (aa === 'G');

    var nca_x = Cap[0] - Np[0], nca_y = Cap[1] - Np[1];
    var nca_l = Math.sqrt(nca_x * nca_x + nca_y * nca_y);
    var nca_px = -nca_y / nca_l, nca_py = nca_x / nca_l;

    var cac_x = Cp[0] - Cap[0], cac_y = Cp[1] - Cap[1];
    var cac_l = Math.sqrt(cac_x * cac_x + cac_y * cac_y);
    var cac_px = -cac_y / cac_l, cac_py = cac_x / cac_l;

    // N
    pushAtom(Np[0], Np[1], 0, 'N', 3);

    // H on N (not for Pro)
    if (!isPro) {
      amideHIdx.push(atoms.length);
      var nhSide = (r % 2 === 0) ? -1 : 1;
      pushAtom(Np[0] + nhSide * nca_px * bNH, Np[1] + nhSide * nca_py * bNH, 0, 'H', 1);
    } else {
      amideHIdx.push(-1);
    }

    // Extra H on N-terminus
    if (r === 0) {
      pushAtom(Np[0] + nca_px * bNH, Np[1] + nca_py * bNH, 0, 'H', 1);
    }

    // Ca
    caIndices.push(atoms.length);
    pushAtom(Cap[0], Cap[1], 0, 'C', 4);

    // Ha + sidechain
    if (isGly) {
      pushAtom(Cap[0], Cap[1], bCH, 'H', 1);
      pushAtom(Cap[0], Cap[1], -bCH, 'H', 1);
    } else {
      // Ha
      var toCenter_x = -cac_px, toCenter_y = -cac_py;
      pushAtom(Cap[0] + toCenter_x * bCH * 0.7, Cap[1] + toCenter_y * bCH * 0.7, bCH * 0.7, 'H', 1);

      // Cb + 3 Hb (simplified sidechain for all non-Gly)
      var cbX = Cap[0] + cac_px * bCaCb * 0.8;
      var cbY = Cap[1] + cac_py * bCaCb * 0.8;
      var cbZ = -bCaCb * 0.6;
      pushAtom(cbX, cbY, cbZ, 'C', 4);
      for (var hh = 0; hh < 3; hh++) {
        var phi = hh * 2.094 + r * 1.2;
        pushAtom(cbX + bCH * 0.8 * Math.cos(phi),
                 cbY + bCH * 0.8 * Math.sin(phi),
                 cbZ + bCH * 0.6 * (hh === 0 ? 1 : -0.5), 'H', 1);
      }
    }

    // Carbonyl C
    pushAtom(Cp[0], Cp[1], 0, 'C', 4);

    // Carbonyl O
    carbonylOIdx.push(atoms.length);
    var oSide = (r % 2 === 0) ? -1 : 1;
    pushAtom(Cp[0] + oSide * cac_px * bCO, Cp[1] + oSide * cac_py * bCO, 0, 'O', 2);

    resEndIdx.push(atoms.length);
  }

  // C-terminal OH
  var lastC = bb[nRes - 1].C, lastCa = bb[nRes - 1].Ca;
  var lc_x = lastC[0] - lastCa[0], lc_y = lastC[1] - lastCa[1];
  var lc_l = Math.sqrt(lc_x * lc_x + lc_y * lc_y);
  pushAtom(lastC[0] + lc_x / lc_l * 1.34 * A, lastC[1] + lc_y / lc_l * 1.34 * A, 0, 'O', 2);
  pushAtom(lastC[0] + lc_x / lc_l * (1.34 * A + bOH), lastC[1] + lc_y / lc_l * (1.34 * A + bOH), 0, 'H', 1);

  var nProtein = atoms.length;

  log.textContent = 'Trp-cage TC5b (extended, 10% bend): ' + atoms.length + ' atoms, ' + nRes + ' residues';
  log.textContent += '\nSequence: ' + seq.join('-');
  log.textContent += '\nHelix(1-9) + Turn(10-14) + PPII(17-19)';
  log.textContent += '\n' + gridN + '^3 grid, screen=' + scr.toFixed(1) + ' au';

  // Fold angle: N-term(Ca0), mid(Ca10), C-term(Ca19)
  window.USER_FOLD_ATOMS = [caIndices[0], caIndices[10], caIndices[19]];

  // Build residue groups
  var resGroups = [];
  for (var r = 0; r < nRes; r++) {
    var group = [];
    for (var a = resStartIdx[r]; a < resEndIdx[r]; a++) group.push(a);
    resGroups.push(group);
  }
  // C-terminal OH
  resGroups.push([nProtein - 2, nProtein - 1]);

  // Key contacts in native trp-cage:
  // Helix H-bonds: O[i]···H[i+4] for i=1-5 (alpha helix region)
  // Trp6 burial: Ca6 close to Ca16-18 (hydrophobic core)
  var bondPairs = [];
  // Helix i→i+4 H-bonds (residues 1-9)
  for (var i = 1; i + 4 <= 9; i++) {
    if (amideHIdx[i+4] >= 0) {
      bondPairs.push([carbonylOIdx[i], amideHIdx[i+4], "O"+i+"···H"+(i+4)+":"]);
    }
  }
  // Trp6-ProPro core distance
  bondPairs.push([caIndices[5], caIndices[17], "W6-P18:"]);
  // End-to-end
  bondPairs.push([caIndices[0], caIndices[19], "Ca0-Ca19:"]);

  window.USER_BOND_PAIRS = bondPairs;

  window.USER_REFERENCE = {
    bonds: {
      "Ca0-Ca19": "~10",
      "W6-P18": "~6"
    },
    energy: "Trp-cage TC5b: extended → native fold",
    binding: "Native: helix(1-9) + hydrophobic core(Trp6 burial)"
  };

  window.USER_CLASSICAL_MD = {
    mode: 'translate',
    pinEnds: 3,
    caIndices: caIndices,
    groups: resGroups,
    offsets: null,
    mdSteps: 50,
    mdDt: 0.01,
    targetCaCa: 3.8 * A
  };

  window.USER_PROTEIN_COUNT = nProtein;
  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = true;
  window.USER_FORCE_SCALE = 50.0;
  window.USER_ARROW_SCALE = 0.2;
  window.USER_N_MOVE = 15;
  window.USER_Z = zList;
  window.USER_RC = elList.map(function(el) {
    if (el === 'H') return 0;
    if (el === 'C') return 0.3;
    if (el === 'N') return 0.3;
    if (el === 'O') return 0.4;
    return 0;
  });
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  p5s.onload = function() {
    // Recording
    var recorder = null, chunks = [], recording = false, recInterval = null;
    window._toggleRecording = function() {
      var canvas = document.querySelector('canvas');
      if (!canvas) return;
      if (!recording) {
        chunks = [];
        var stream = canvas.captureStream(0);
        var track = stream.getVideoTracks()[0];
        window._recStreamTrack = track;
        var mimeType = MediaRecorder.isTypeSupported('video/webm; codecs=vp9')
          ? 'video/webm; codecs=vp9' : 'video/webm';
        recorder = new MediaRecorder(stream, { mimeType: mimeType });
        recorder.ondataavailable = function(ev) { if (ev.data.size > 0) chunks.push(ev.data); };
        recorder.onstop = function() {
          var blob = new Blob(chunks, { type: mimeType });
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url; a.download = 'trpcage_fold.webm'; a.click();
          URL.revokeObjectURL(url);
        };
        recorder.start(1000);
        recInterval = setInterval(function() { try { track.requestFrame(); } catch(e) {} }, 20000); // 1 frame per 20s → 1hr = 180 frames → 6s at 30fps
        recording = true;
        var dot = document.createElement('div');
        dot.id = 'rec-indicator';
        dot.style.cssText = 'position:fixed;top:10px;right:10px;background:red;color:#fff;padding:4px 10px;border-radius:4px;font:bold 14px monospace;z-index:9999;';
        dot.textContent = '\u25CF REC';
        document.body.appendChild(dot);
      } else {
        if (recInterval) { clearInterval(recInterval); recInterval = null; }
        recorder.stop(); recording = false;
        window._recStreamTrack = null;
        var ind = document.getElementById('rec-indicator');
        if (ind) ind.remove();
      }
    };
    // Auto-start 3D + recording
    setTimeout(function() {
      window._view3D = true;
      setTimeout(function() {
        window._toggleRecording();
        setTimeout(function() { if (recording) window._toggleRecording(); }, 60 * 60 * 1000);
      }, 3000);
    }, 5000);
  };
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
