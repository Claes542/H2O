<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// Alpha helix: 12-residue polyglycine + solvation shell
// Helix params: 3.6 residues/turn, rise 1.5 A/residue, radius 2.3 A
(function() {
  var gridN = 200, scr = 50;
  var A = 1.8897; // angstrom to au
  var positions = [];
  var elList = [];
  var zList = [];

  function pushAtom(x, y, z, el, Z) {
    positions.push({x: x, y: y, z: z});
    elList.push(el);
    zList.push(Z);
  }

  var nRes = 12;

  // Alpha helix geometry
  var rise = 1.5 * A;        // 1.5 A rise per residue along helix axis (z)
  var radius = 2.3 * A;      // 2.3 A backbone radius
  var turnAngle = 2 * Math.PI / 3.6;  // 100 deg per residue

  // Bond lengths
  var bNH = 1.01 * A;
  var bCH = 1.09 * A;
  var bCO = 1.24 * A;
  var bOH = 0.97 * A;

  // Center helix along z-axis, centered at origin
  var zOff = -(nRes - 1) * rise / 2;

  for (var r = 0; r < nRes; r++) {
    var phi = r * turnAngle;
    var zBase = zOff + r * rise;

    // N position (on helix backbone)
    var nx = radius * Math.cos(phi);
    var ny = radius * Math.sin(phi);
    var nz = zBase;

    // Ca position (slightly advanced along helix)
    var phiCa = phi + turnAngle * 0.35;
    var zCa = zBase + rise * 0.35;
    var cax = radius * Math.cos(phiCa);
    var cay = radius * Math.sin(phiCa);
    var caz = zCa;

    // C position
    var phiC = phi + turnAngle * 0.7;
    var zC = zBase + rise * 0.7;
    var cx = radius * Math.cos(phiC);
    var cy = radius * Math.sin(phiC);
    var cz = zC;

    // N atom
    pushAtom(nx, ny, nz, 'N', 3);

    // H on N — points radially outward
    var nRad = Math.sqrt(nx * nx + ny * ny);
    if (nRad > 0.01) {
      pushAtom(nx + nx / nRad * bNH, ny + ny / nRad * bNH, nz, 'H', 1);
    } else {
      pushAtom(nx + bNH, ny, nz, 'H', 1);
    }

    // Extra H on N-terminus
    if (r === 0) {
      pushAtom(nx, ny, nz - bNH, 'H', 1);
    }

    // Ca atom
    pushAtom(cax, cay, caz, 'C', 4);

    // 2 H on Ca (glycine CH2) — tangential to helix
    var tangX = -Math.sin(phiCa);
    var tangY = Math.cos(phiCa);
    pushAtom(cax + tangX * bCH, cay + tangY * bCH, caz, 'H', 1);
    pushAtom(cax - tangX * bCH, cay - tangY * bCH, caz, 'H', 1);

    // Carbonyl C
    pushAtom(cx, cy, cz, 'C', 4);

    // Carbonyl O — points radially outward
    var cRad = Math.sqrt(cx * cx + cy * cy);
    if (cRad > 0.01) {
      pushAtom(cx + cx / cRad * bCO, cy + cy / cRad * bCO, cz, 'O', 2);
    } else {
      pushAtom(cx + bCO, cy, cz, 'O', 2);
    }
  }

  // C-terminal OH
  var lastPhiC = (nRes - 1) * turnAngle + turnAngle * 0.7;
  var lastZC = zOff + (nRes - 1) * rise + rise * 0.7;
  var lastCx = radius * Math.cos(lastPhiC);
  var lastCy = radius * Math.sin(lastPhiC);
  // OH along helix axis direction
  pushAtom(lastCx, lastCy, lastZC + 1.34 * A, 'O', 2);
  pushAtom(lastCx, lastCy, lastZC + 1.34 * A + bOH, 'H', 1);

  var nProtein = positions.length;

  // --- Solvation shell ---
  var ohBond = 0.96 * A;
  var halfAng = 52.25 * Math.PI / 180;
  var waterSpacing = 2.8 * A;
  var minWaterDist = 2.5 * A;
  var maxR = scr / 2 - 3 * A;

  // Center of protein
  var pcx = 0, pcy = 0, pcz = 0;
  for (var i = 0; i < nProtein; i++) {
    pcx += positions[i].x; pcy += positions[i].y; pcz += positions[i].z;
  }
  pcx /= nProtein; pcy /= nProtein; pcz /= nProtein;

  var nWater = 0;
  // 2D solvation in x-y plane (helix viewed from side, z projected to 2D)
  for (var wx = pcx - maxR; wx <= pcx + maxR; wx += waterSpacing) {
    for (var wy = pcy - maxR; wy <= pcy + maxR; wy += waterSpacing) {
      if (Math.abs(wx) > maxR || Math.abs(wy) > maxR) continue;

      var tooClose = false;
      for (var pi = 0; pi < nProtein; pi++) {
        var ddx = wx - positions[pi].x, ddy = wy - positions[pi].y;
        if (ddx * ddx + ddy * ddy < minWaterDist * minWaterDist) {
          tooClose = true;
          break;
        }
      }
      if (tooClose) continue;

      var wAngle = (wx * 7.3 + wy * 11.1) % (2 * Math.PI);
      pushAtom(wx, wy, 0, 'O', 2);
      pushAtom(wx + ohBond * Math.cos(wAngle + halfAng),
               wy + ohBond * Math.sin(wAngle + halfAng), 0, 'H', 1);
      pushAtom(wx + ohBond * Math.cos(wAngle - halfAng),
               wy + ohBond * Math.sin(wAngle - halfAng), 0, 'H', 1);
      nWater++;
    }
  }

  console.log('Alpha helix solvated: ' + nProtein + ' protein + ' + nWater + ' waters = ' + positions.length + ' total');

  // Map to grid
  var h = scr / gridN;
  var N2 = Math.round(gridN / 2);
  var atoms = [];

  for (var i = 0; i < positions.length; i++) {
    var p = positions[i];
    var gi = Math.round(N2 + (p.x - pcx) / h);
    var gj = Math.round(N2 + (p.y - pcy) / h);
    var gk = Math.round(N2 + (p.z - pcz) / h);
    gi = Math.max(3, Math.min(gridN - 3, gi));
    gj = Math.max(3, Math.min(gridN - 3, gj));
    gk = Math.max(3, Math.min(gridN - 3, gk));
    atoms.push({ i: gi, j: gj, k: gk, Z: zList[i], el: elList[i] });
  }

  window.USER_PROTEIN_COUNT = nProtein;
  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_Z = zList;
  window.USER_RC = elList.map(function(el) {
    if (el === 'H') return 0;
    if (el === 'C') return 0.3;
    if (el === 'N') return 0.3;
    if (el === 'O') return 0.4;
    return 0;
  });
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
