<!DOCTYPE html>
<html><body style="margin:0;background:#000;color:#fff;font-family:monospace">
<pre id="log">Building hairpin (unfolded)...</pre>
<script>
var log = document.getElementById('log');
window.onerror = function(msg, url, line) {
  log.textContent += '\nERROR: ' + msg + '\nLine: ' + line;
};

// Beta hairpin 12-residue polyglycine — UNFOLDED (extended chain) + 1 water
// Same atoms as hairpin.html but laid out as straight extended strand
// Each glycine residue: N, H, Ca, 2Ha, C, O = 7 atoms × 12 = 84
// + N-term extra H + C-term OH = 84 + 1 + 2 = 87 protein + 3 water = 90 atoms
// 300^3 grid, screen=100 au (extended chain is long)

(function() {
  var gridN = 300, scr = 100;
  var h = scr / gridN;  // ~0.333 au/cell
  var N2 = Math.round(gridN / 2);
  var A = 1.8897;
  var atoms = [];

  function addAtom(au_x, au_y, au_z, Z, el) {
    var gi = Math.round(N2 + au_x / h);
    var gj = Math.round(N2 + au_y / h);
    var gk = Math.round(N2 + au_z / h);
    gi = Math.max(3, Math.min(gridN - 3, gi));
    gj = Math.max(3, Math.min(gridN - 3, gj));
    gk = Math.max(3, Math.min(gridN - 3, gk));
    atoms.push({ i: gi, j: gj, k: gk, Z: Z, el: el });
  }

  var nRes = 12;
  // Extended strand: ~3.8 A per residue (fully stretched peptide)
  var resAdv = 3.8 * A;   // ~7.2 au per residue
  var zig = 0.5 * A;      // zigzag amplitude

  // Bond lengths (au)
  var bNH = 1.01 * A;
  var bCH = 1.09 * A;
  var bCO = 1.24 * A;
  var bOH = 0.97 * A;

  // Extended chain along x-axis, centered
  var totalLen = (nRes - 1) * resAdv;
  var x0 = -totalLen / 2;

  for (var r = 0; r < nRes; r++) {
    var xr = x0 + r * resAdv;
    var zigSign = (r % 2 === 0) ? 1 : -1;
    var yBase = zigSign * zig;

    // N atom
    var Nx = xr - 0.35 * resAdv;
    var Ny = yBase * 0.6;
    addAtom(Nx, Ny, 0, 3, 'N');

    // H on N (perpendicular)
    addAtom(Nx, Ny + zigSign * bNH, 0, 1, 'H');

    // Extra H on N-terminus (residue 0)
    if (r === 0) {
      addAtom(Nx, Ny - zigSign * bNH, 0, 1, 'H');
    }

    // Ca atom (glycine)
    var Cax = xr;
    var Cay = -yBase * 0.4;
    addAtom(Cax, Cay, 0, 4, 'C');

    // 2 H on Ca (glycine CH2, perpendicular to backbone in z)
    addAtom(Cax, Cay, bCH, 1, 'H');
    addAtom(Cax, Cay, -bCH, 1, 'H');

    // Carbonyl C
    var Cx = xr + 0.35 * resAdv;
    var Cy = yBase * 0.3;
    addAtom(Cx, Cy, 0, 4, 'C');

    // Carbonyl O (alternating sides)
    var oSide = -zigSign;
    addAtom(Cx, Cy + oSide * bCO, 0, 2, 'O');
  }

  // C-terminal OH group
  var lastCx = x0 + (nRes - 1) * resAdv + 0.35 * resAdv;
  var lastCy = ((nRes - 1) % 2 === 0 ? 1 : -1) * zig * 0.3;
  var ohX = lastCx + 1.34 * A;
  addAtom(ohX, lastCy, 0, 2, 'O');
  addAtom(ohX + bOH, lastCy, 0, 1, 'H');

  // 1 water molecule above the chain
  addAtom(0, 5 * A, 0, 2, 'O');
  addAtom(-0.76 * A, 5 * A - 0.59 * A, 0, 1, 'H');
  addAtom(0.76 * A, 5 * A - 0.59 * A, 0, 1, 'H');

  log.textContent = 'Hairpin (unfolded): ' + atoms.length + ' atoms, ' + nRes + ' glycine residues + 1 water';
  log.textContent += '\nExtended chain on ' + gridN + '^3 grid, screen=' + scr + ' au';

  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_Z = atoms.map(function(a) { return a.Z; });
  window.USER_RC = atoms.map(function(a) { return 0; });
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onerror = function() { log.textContent += '\nFailed to load molecule.js!'; };
s.onload = function() {
  log.textContent += '\nmolecule.js loaded, loading p5...';
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  p5s.crossOrigin = 'anonymous';
  p5s.onerror = function() { log.textContent += '\nFailed to load p5.js!'; };
  p5s.onload = function() { log.textContent += '\np5.js loaded'; };
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
