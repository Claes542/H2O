<!DOCTYPE html>
<html><body style="margin:0;background:#000">
<script>
// Alpha helix: 8-residue polyglycine — LOOSE HELIX start + solvation shell
// Starts from stretched helix, dynamics tighten toward ideal
// Water shell provides H-bond partners to stabilize helix
(function() {
  var gridN = 200, scr = 50;
  var A = 1.8897; // angstrom to au
  var h = scr / gridN;
  var N2 = Math.round(gridN / 2);
  var atoms = [];
  var elList = [];
  var zList = [];

  function pushAtom(x, y, z, el, Z) {
    atoms.push({
      i: Math.round(N2 + x / h),
      j: Math.round(N2 + y / h),
      k: Math.round(N2 + z / h),
      Z: Z, el: el
    });
    elList.push(el);
    zList.push(Z);
  }

  var nRes = 8;

  // Loose helix — same as dry version
  // Ideal: rise=1.5 A, radius=2.3 A, 3.6 res/turn
  // Start: rise=2.5 A, radius=1.2 A (stretched, barely wound)
  var rise = 2.5 * A;
  var radius = 1.2 * A;
  var turnAngle = 2 * Math.PI / 3.6;

  // Bond lengths
  var bNH = 1.01 * A;
  var bCH = 1.09 * A;
  var bCO = 1.24 * A;
  var bOH = 0.97 * A;

  // Center helix along z-axis
  var zOff = -(nRes - 1) * rise / 2;

  // Track atom indices for dynamics
  var atomIdx = { N:[], H:[], Ca:[], C:[], O:[] };

  for (var r = 0; r < nRes; r++) {
    var phi = r * turnAngle;
    var zBase = zOff + r * rise;

    var nx = radius * Math.cos(phi);
    var ny = radius * Math.sin(phi);
    var nz = zBase;

    var phiCa = phi + turnAngle * 0.35;
    var zCa = zBase + rise * 0.35;
    var cax = radius * Math.cos(phiCa);
    var cay = radius * Math.sin(phiCa);
    var caz = zCa;

    var phiC = phi + turnAngle * 0.7;
    var zC = zBase + rise * 0.7;
    var cx = radius * Math.cos(phiC);
    var cy = radius * Math.sin(phiC);
    var cz = zC;

    function radialAt(px, py) {
      var l = Math.sqrt(px*px + py*py) + 1e-10;
      return [px/l, py/l, 0];
    }
    function tangAt(px, py) {
      var l = Math.sqrt(px*px + py*py) + 1e-10;
      return [-py/l, px/l, 0];
    }

    var radN = radialAt(nx, ny);
    var tangCa = tangAt(cax, cay);
    var radC = radialAt(cx, cy);

    // N
    atomIdx.N.push(atoms.length);
    pushAtom(nx, ny, nz, 'N', 3);

    // H on N
    atomIdx.H.push(atoms.length);
    pushAtom(nx + radN[0]*bNH, ny + radN[1]*bNH, nz, 'H', 1);

    // Extra H on N-terminus
    if (r === 0) {
      pushAtom(nx, ny, nz - bNH, 'H', 1);
    }

    // Ca
    atomIdx.Ca.push(atoms.length);
    pushAtom(cax, cay, caz, 'C', 4);

    // 2 Ha on Ca
    pushAtom(cax + tangCa[0]*bCH, cay + tangCa[1]*bCH, caz, 'H', 1);
    pushAtom(cax - tangCa[0]*bCH, cay - tangCa[1]*bCH, caz, 'H', 1);

    // Carbonyl C
    atomIdx.C.push(atoms.length);
    pushAtom(cx, cy, cz, 'C', 4);

    // Carbonyl O
    atomIdx.O.push(atoms.length);
    pushAtom(cx + radC[0]*bCO, cy + radC[1]*bCO, cz, 'O', 2);
  }

  // C-terminal OH
  var lastPhiC = (nRes - 1) * turnAngle + turnAngle * 0.7;
  var lastZC = zOff + (nRes - 1) * rise + rise * 0.7;
  var lastCx = radius * Math.cos(lastPhiC);
  var lastCy = radius * Math.sin(lastPhiC);
  pushAtom(lastCx, lastCy, lastZC + 1.34 * A, 'O', 2);
  pushAtom(lastCx, lastCy, lastZC + 1.34 * A + bOH, 'H', 1);

  var nProtein = atoms.length;
  console.log('Protein atoms: ' + nProtein);

  // --- Solvation shell ---
  // Place waters on a grid around the protein, excluding overlap
  var ohBond = 0.96 * A;
  var halfAng = 52.25 * Math.PI / 180;
  var waterSpacing = 3.0 * A;   // spacing between waters
  var minWaterDist = 2.8 * A;   // min distance from protein atoms
  var maxR = scr / 2 - 2 * A;   // stay within box

  // Get protein positions in au for distance checks
  var protPos = [];
  for (var i = 0; i < nProtein; i++) {
    protPos.push({
      x: (atoms[i].i - N2) * h,
      y: (atoms[i].j - N2) * h,
      z: (atoms[i].k - N2) * h
    });
  }

  // Protein centroid
  var pcx = 0, pcy = 0, pcz = 0;
  for (var i = 0; i < nProtein; i++) {
    pcx += protPos[i].x; pcy += protPos[i].y; pcz += protPos[i].z;
  }
  pcx /= nProtein; pcy /= nProtein; pcz /= nProtein;

  var nWater = 0;
  // 3D solvation shell — waters around the helix
  for (var wx = -maxR; wx <= maxR; wx += waterSpacing) {
    for (var wy = -maxR; wy <= maxR; wy += waterSpacing) {
      for (var wz = -maxR; wz <= maxR; wz += waterSpacing) {
        // Stay within spherical shell
        var dr = Math.sqrt(wx*wx + wy*wy + wz*wz);
        if (dr > maxR) continue;

        // Check distance from all protein atoms
        var tooClose = false;
        for (var pi = 0; pi < nProtein; pi++) {
          var ddx = wx - protPos[pi].x;
          var ddy = wy - protPos[pi].y;
          var ddz = wz - protPos[pi].z;
          if (ddx*ddx + ddy*ddy + ddz*ddz < minWaterDist * minWaterDist) {
            tooClose = true;
            break;
          }
        }
        if (tooClose) continue;

        // Random-ish orientation based on position
        var wAngle = (wx * 7.3 + wy * 11.1 + wz * 3.7) % (2 * Math.PI);

        pushAtom(wx, wy, wz, 'O', 2);
        pushAtom(wx + ohBond * Math.cos(wAngle + halfAng),
                 wy + ohBond * Math.sin(wAngle + halfAng), wz, 'H', 1);
        pushAtom(wx + ohBond * Math.cos(wAngle - halfAng),
                 wy + ohBond * Math.sin(wAngle - halfAng), wz, 'H', 1);
        nWater++;
      }
    }
  }

  console.log('Solvated helix: ' + nProtein + ' protein + ' + nWater + ' waters (' + (nWater*3) + ' atoms) = ' + atoms.length + ' total');

  // Bond pairs — backbone + i→i+4 H-bonds
  var bondPairs = [
    [atomIdx.N[0], atomIdx.Ca[0], "N-Ca:"],
    [atomIdx.Ca[0], atomIdx.C[0], "Ca-C:"],
    [atomIdx.C[0], atomIdx.O[0], "C=O:"],
    [atomIdx.C[0], atomIdx.N[1], "C-N:"],
    [atomIdx.N[1], atomIdx.H[1], "N-H:"],
  ];
  for (var i = 0; i + 4 < nRes; i++) {
    bondPairs.push([atomIdx.O[i], atomIdx.H[i+4], "O"+i+"···H"+(i+4)+":"]);
  }
  window.USER_BOND_PAIRS = bondPairs;

  window.USER_REFERENCE = {
    bonds: {
      "N-Ca": "1.46", "Ca-C": "1.52", "C=O": "1.23",
      "C-N": "1.33", "N-H": "1.01",
    },
    energy: "Solvated loose helix → tight helix: 8-res Gly",
    binding: "H-bond ~5 kcal/mol, water should stabilize"
  };

  // Rigid-group classical MD — protein residues only
  var mdGroups = [];
  for (var r = 0; r < nRes; r++) {
    var group = [];
    var start = atomIdx.N[r];
    var end = (r < nRes - 1) ? atomIdx.N[r+1] : nProtein - 2;
    for (var a = start; a < end; a++) group.push(a);
    mdGroups.push(group);
  }
  // C-terminal OH
  mdGroups.push([nProtein - 2, nProtein - 1]);

  window.USER_CLASSICAL_MD = {
    mode: 'translate',
    pinEnds: false,        // let all residues move freely — water cage provides containment
    caIndices: atomIdx.Ca,
    groups: mdGroups,
    offsets: null,
    mdSteps: 50,
    mdDt: 0.01,
    helicalBias: {
      idealRadius: 2.3 * A,
      strength: 0.03
    }
  };

  // Helix progress tracking
  window.USER_HELIX_PROGRESS = {
    caIndices: atomIdx.Ca,
    oIndices: atomIdx.O,
    hIndices: atomIdx.H,
    idealRadius: 2.3 * A,
    idealRise: 1.5 * A,
    hbondCutoff: 2.5 * A
  };

  window.USER_PROTEIN_COUNT = nProtein;
  window.USER_NN = gridN;
  window.USER_ATOMS = atoms;
  window.USER_SCREEN = scr;
  window.USER_STEPS = 1000000;
  window.USER_DYNAMICS = true;
  window.USER_FORCE_SCALE = 100.0;
  window.USER_ARROW_SCALE = 2.0;
  window.USER_N_MOVE = 100;
  window.USER_Z = zList;
  window.USER_RC = elList.map(function(el) {
    if (el === 'H') return 0;
    if (el === 'C') return 0.3;
    if (el === 'N') return 0.3;
    if (el === 'O') return 0.4;
    return 0;
  });
})();

var s = document.createElement('script');
s.src = 'molecule.js?t=' + Date.now();
s.onload = function() {
  var p5s = document.createElement('script');
  p5s.src = 'https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js';
  document.body.appendChild(p5s);
};
document.body.appendChild(s);
</script>
</body></html>
